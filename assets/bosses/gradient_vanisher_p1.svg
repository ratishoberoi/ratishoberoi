    <circle class="void-particle-drift" cx="50" cy="120" r="4" fill="#ff2bd6" fill-opacity=".46"/>
    <circle class="void-particle-drift" cx="139" cy="251" r="5" fill="#ff2bd6" fill-opacity=".46"/>
    <circle class="void-particle-drift" cx="228" cy="382" r="2" fill="#ff2bd6" fill-opacity=".46"/>
    <circle class="void-particle-drift" cx="317" cy="93" r="3" fill="#ff2bd6" fill-opacity=".46"/>
    <circle class="void-particle-drift" cx="406" cy="224" r="4" fill="#ff2bd6" fill-opacity=".46"/>
    <circle class="void-particle-drift" cx="495" cy="355" r="5" fill="#ff2bd6" fill-opacity=".46"/>
    <circle class="void-particle-drift" cx="584" cy="486" r="2" fill="#ff2bd6" fill-opacity=".46"/>
    <circle class="void-particle-drift" cx="673" cy="197" r="3" fill="#ff2bd6" fill-opacity=".46"/>
    <circle class="void-particle-drift" cx="762" cy="328" r="4" fill="#ff2bd6" fill-opacity=".46"/>
    <circle class="void-particle-drift" cx="851" cy="459" r="5" fill="#ff2bd6" fill-opacity=".46"/>
    <circle class="void-particle-drift" cx="60" cy="170" r="2" fill="#ff2bd6" fill-opacity=".46"/>
    <circle class="void-particle-drift" cx="149" cy="301" r="3" fill="#ff2bd6" fill-opacity=".46"/>
    <circle class="void-particle-drift" cx="238" cy="432" r="4" fill="#ff2bd6" fill-opacity=".46"/>
    <circle class="void-particle-drift" cx="327" cy="143" r="5" fill="#ff2bd6" fill-opacity=".46"/>
    <circle class="void-particle-drift" cx="416" cy="274" r="2" fill="#ff2bd6" fill-opacity=".46"/>
    <path class="corruption-pulse" d="M128 76L824 488M846 58L96 502M304 28L612 530M54 248L924 316" stroke="#7a5cff" stroke-width="6" stroke-opacity=".62" stroke-dasharray="16 18" fill="none"/>
    
  </g>
  <g filter="url(#glow)">
    <text x="58" y="66" fill="#ff2bd6" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="20" font-weight="900">PHASE 1</text>
    <text x="58" y="92" fill="#f7fbff" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="16" font-weight="900">Single Singularity</text>
    <circle class="threat-indicator-pulse" cx="902" cy="58" r="19" fill="#b8f7ff" filter="url(#glow)"/>
  </g>
</svg>
