<svg width="960" height="540" viewBox="0 0 960 540" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">The Overfitted Beast Chains Breaking</title>
  <desc id="desc">Mutated form: sample cards fuse into armor and its claws become decision trees.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="540" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050b14"/>
      <stop offset=".48" stop-color="#12051c"/>
      <stop offset="1" stop-color="#061b22"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="46%" r="50%">
      <stop offset="0" stop-color="#ff3b6b" stop-opacity=".32"/>
      <stop offset=".45" stop-color="#ffe95e" stop-opacity=".16"/>
      <stop offset="1" stop-color="#020713" stop-opacity="0"/>
    </radialGradient>
    <pattern id="scan" width="9" height="9" patternUnits="userSpaceOnUse">
      <path d="M0 0H9" stroke="#ff3b6b" stroke-opacity=".08"/>
    </pattern>
    <filter id="phaseImage">
      <feColorMatrix type="saturate" values="1.44"/>
      <feComponentTransfer>
        <feFuncR type="linear" slope="1.12"/>
        <feFuncG type="linear" slope="1.04"/>
        <feFuncB type="linear" slope="1.08"/>
      </feComponentTransfer>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="heavyGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes pulseGlow { 0%,100% { opacity: .46; } 50% { opacity: 1; } }
      @keyframes energyMove { to { stroke-dashoffset: -260; transform: translateX(34px); } }
      @keyframes scanMove { 0% { transform: translateY(-540px); } 100% { transform: translateY(540px); } }
      @keyframes reactorFlicker { 0%,100% { opacity: .34; transform: scale(.94); } 40% { opacity: .92; transform: scale(1.08); } 70% { opacity: .58; transform: scale(1.02); } }
      @keyframes corruptionPulse { 0%,100% { opacity: .22; } 50% { opacity: .78; } }
      @keyframes eyeGlowPulse { 0%,100% { opacity: .56; } 50% { opacity: 1; } }
      @keyframes threatPulse { 0%,100% { opacity: .52; } 50% { opacity: 1; } }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes sweep { 0% { transform: translateX(-960px); } 100% { transform: translateX(960px); } }
      @keyframes emberRise { 0% { transform: translateY(60px); opacity: 0; } 35% { opacity: .9; } 100% { transform: translateY(-220px); opacity: 0; } }
      @keyframes mouthFire { 0%,100% { opacity: .28; transform: scaleX(.92); } 50% { opacity: .88; transform: scaleX(1.08); } }
      @keyframes heatDistort { 0%,100% { transform: translateX(-12px); opacity: .22; } 50% { transform: translateX(14px); opacity: .62; } }
      @keyframes smokeDrift { 0% { transform: translateX(-30px); opacity: .04; } 50% { opacity: .18; } 100% { transform: translateX(42px); opacity: .04; } }
      @keyframes dataFall { 0% { transform: translateY(-120px); opacity: 0; } 20% { opacity: .9; } 100% { transform: translateY(560px); opacity: 0; } }
      @keyframes lockDrift { 0%,100% { transform: translate(0,0); } 50% { transform: translate(12px,-18px); } }
      @keyframes particleDrift { 0%,100% { transform: translate(0,0); opacity: .25; } 50% { transform: translate(20px,-26px); opacity: .8; } }
      @keyframes orbitPlanet { to { transform: rotate(360deg); } }
      @keyframes rotateEquation { 0%,100% { transform: rotate(-2deg); opacity: .34; } 50% { transform: rotate(3deg); opacity: .84; } }
      @keyframes voidDrift { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-18px,16px); } }
      @keyframes apparitionFade { 0%,100% { opacity: .08; transform: scale(.92); } 50% { opacity: .46; transform: scale(1.08); } }
      @keyframes fragmentDrift { 0%,100% { transform: translateY(0) rotate(0deg); opacity: .18; } 50% { transform: translateY(-24px) rotate(8deg); opacity: .58; } }
      @keyframes chainMove { to { stroke-dashoffset: -180; } }
      @keyframes lightningFlash { 0%,100% { opacity: .15; } 45% { opacity: 1; } 52% { opacity: .25; } 60% { opacity: .9; } }
      @keyframes veinSurge { to { stroke-dashoffset: -140; } }
      @keyframes magicRotate { to { transform: rotate(360deg); } }
      @keyframes pageDrift { 0%,100% { transform: translate(0,0) rotate(0deg); opacity: .25; } 50% { transform: translate(18px,-24px) rotate(6deg); opacity: .74; } }
      @keyframes promptFloat { 0%,100% { transform: translateY(0); opacity: .25; } 50% { transform: translateY(-30px); opacity: .82; } }
      .pulsing-glow { animation: pulseGlow 1.96s ease-in-out infinite; }
      .energy-movement { animation: energyMove 4.44s linear infinite; }
      .scanline-movement { animation: scanMove 5.1s linear infinite; }
      .reactor-flicker { transform-box: fill-box; transform-origin: center; animation: reactorFlicker 1.44s steps(3,end) infinite; }
      .corruption-pulse { animation: corruptionPulse 2.36s ease-in-out infinite; }
      .eye-glow-pulse { animation: eyeGlowPulse 1.6600000000000001s ease-in-out infinite; }
      .threat-indicator-pulse { animation: threatPulse 1.54s ease-in-out infinite; }
      .spin { transform-origin: 480px 270px; animation: spin 10s linear infinite; }
      .sweep { animation: sweep 5.2s linear infinite; }
      .ember-rise { animation: emberRise 2.7s ease-out infinite; }
      .mouth-fire { transform-box: fill-box; transform-origin: center; animation: mouthFire 1.1400000000000001s ease-in-out infinite; }
      .heat-distortion { animation: heatDistort 2.32s ease-in-out infinite; }
      .smoke-drift { animation: smokeDrift 5.2s ease-in-out infinite; }
      .data-waterfall { animation: dataFall 3.84s linear infinite; }
      .lock-drift { animation: lockDrift 3.64s ease-in-out infinite; }
      .corruption-particle { animation: particleDrift 2.7600000000000002s ease-in-out infinite; }
      .data-leak { animation: energyMove 3.32s linear infinite; }
      .orbiting-planet { transform-origin: 480px 270px; animation: orbitPlanet 9.6s linear infinite; }
      .rotating-equation { transform-box: fill-box; transform-origin: center; animation: rotateEquation 4.32s ease-in-out infinite; }
      .void-particle-drift { animation: voidDrift 3.4s ease-in-out infinite; }
      .orbiting-face { transform-origin: 480px 270px; animation: orbitPlanet 10.2s linear infinite; }
      .apparition-fade { animation: apparitionFade 3.16s ease-in-out infinite; }
      .memory-fragment { animation: fragmentDrift 4.08s ease-in-out infinite; }
      .moving-chain { animation: chainMove 3.2399999999999998s linear infinite; }
      .lightning-arc { animation: lightningFlash 1.48s steps(2,end) infinite; }
      .glowing-vein { animation: veinSurge 2.7s linear infinite; }
      .magic-circle-rotate { transform-origin: 480px 286px; animation: magicRotate 11.2s linear infinite; }
      .spell-page-drift { animation: pageDrift 4.2s ease-in-out infinite; }
      .prompt-fragment { animation: promptFloat 3.28s ease-in-out infinite; }
    </style>
  </defs>
  <rect width="960" height="540" fill="url(#bg)"/>
  <image href="../boss_phases/overfitted_beast_p2.png" x="0" y="0" width="960" height="540" preserveAspectRatio="xMidYMid slice" filter="url(#phaseImage)"/>
