name: Neural Nexus — Signal Handler

on:
  issues:
    types: [opened]

jobs:
  process-signal:
    if: startsWith(github.event.issue.title, 'signal|')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v3

      - name: Run signal processor
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_USER: ${{ github.event.issue.user.login }}
        run: |
          python3 << 'PYEOF'
          import os, re
          from datetime import datetime

          title = os.environ.get("ISSUE_TITLE", "").strip()
          body  = os.environ.get("ISSUE_BODY", "").strip()
          user  = os.environ.get("ISSUE_USER", "").strip()
          now   = datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")

          if not title.startswith("signal|"):
              print("Not a signal. Skipping.")
              exit(0)

          with open("README.md", "r") as f:
              readme = f.read()

          parts = title.split("|")
          signal_type = parts[1] if len(parts) > 1 else ""

          # ── DOOR signals ──────────────────────────────────────────────
          if signal_type in ["researcher", "builder", "hacker", "explorer"]:
              icons = {
                  "researcher": "🔬",
                  "builder":    "🛠️",
                  "hacker":     "💀",
                  "explorer":   "🗺️",
              }
              icon = icons[signal_type]
              label = signal_type.capitalize()

              # Count current signals to assign signal number
              existing = re.findall(r'`#(\d+)`', readme)
              next_num = max([int(x) for x in existing], default=0) + 1
              signal_id = f"`#{next_num:03d}`"

              new_row = f"| {signal_id} | [@{user}](https://github.com/{user}) | {icon} {label} | {now} |"
              placeholder = "| `#000` | *Awaiting first transmission...* | — | — |"

              if placeholder in readme:
                  readme = readme.replace(placeholder, new_row + "\n" + placeholder)
              else:
                  # append after table header row
                  header = "| Signal | Visitor | Door | Timestamp |"
                  divider = "|--------|---------|------|-----------|"
                  readme = readme.replace(
                      divider + "\n| `#000`",
                      divider + "\n" + new_row + "\n| `#000`"
                  )

              # Update door counters in SYSTEM STATUS block
              counter_key = f"{label}: 0"
              # Try to increment existing counts
              def bump_counter(text, label):
                  pattern = rf"({re.escape(label)}: )(\d+)"
                  match = re.search(pattern, text)
                  if match:
                      new_val = int(match.group(2)) + 1
                      return text.replace(match.group(0), f"{match.group(1)}{new_val}")
                  return text

              readme = bump_counter(readme, label)

              # Update total signals received
              sig_pattern = r"(SIGNALS RECV\s*→\s*)(\d+)"
              sig_match = re.search(sig_pattern, readme)
              if sig_match:
                  new_count = int(sig_match.group(2)) + 1
                  readme = readme.replace(sig_match.group(0), f"{sig_match.group(1)}{new_count}")

          # ── RIDDLE signals ────────────────────────────────────────────
          elif signal_type == "riddle":
              riddle_num = parts[2] if len(parts) > 2 else "001"
              # Extract first meaningful line of body as the answer
              answer_lines = [l.strip() for l in body.split("\n") if l.strip() and not l.strip().startswith("(")]
              answer = answer_lines[-1][:60] if answer_lines else "..."

              new_row = f"| [@{user}](https://github.com/{user}) | {answer} | ⏳ |"
              placeholder = "| *Awaiting first decoder...* | — | — |"

              if placeholder in readme:
                  readme = readme.replace(placeholder, new_row + "\n" + placeholder)
              else:
                  header = "| Decoder | Answer | Verdict |"
                  divider = "|---------|--------|---------|"
                  readme = readme.replace(
                      divider + "\n| *Awaiting",
                      divider + "\n" + new_row + "\n| *Awaiting"
                  )

          # ── EASTER EGG — vault found ──────────────────────────────────
          elif signal_type == "vault":
              sub = parts[2] if len(parts) > 2 else ""
              if sub == "found":
                  # Update vault unlock counter
                  vault_pattern = r"(VAULT UNLOCKS\s*→\s*)(\d+)"
                  vault_match = re.search(vault_pattern, readme)
                  if vault_match:
                      new_count = int(vault_match.group(2)) + 1
                      readme = readme.replace(vault_match.group(0), f"{vault_match.group(1)}{new_count}")

          else:
              print(f"Unknown signal type: {signal_type}. Skipping.")
              exit(0)

          with open("README.md", "w") as f:
              f.write(readme)
          print("README updated.")
          PYEOF

      - name: Commit changes
        run: |
          git config user.name "Neural Nexus Core"
          git config user.email "actions@github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "⚡ Signal received from @${{ github.event.issue.user.login }}"
          git push

      - name: Respond and close issue
        uses: actions/github-script@v6
        with:
          script: |
            const title = context.payload.issue.title;
            const user  = context.payload.issue.user.login;
            const parts = title.split("|");
            const type  = parts[1] || "";

            const doorMessages = {
              researcher: `🔬 **Signal logged, @${user}.**\n\nYou entered as a **Researcher**.\nYour transmission has been recorded in the Neural Nexus Signal Log.\n\n*The system remembers everyone who passes through.*`,
              builder:    `🛠️ **Signal logged, @${user}.**\n\nYou entered as a **Builder**.\nYour transmission has been recorded in the Neural Nexus Signal Log.\n\n*The system remembers everyone who passes through.*`,
              hacker:     `💀 **Signal logged, @${user}.**\n\nYou entered as a **Hacker**.\nYour transmission has been recorded in the Neural Nexus Signal Log.\n\n*The system remembers everyone who passes through.*`,
              explorer:   `🗺️ **Signal logged, @${user}.**\n\nYou entered as an **Explorer**.\nYour transmission has been recorded in the Neural Nexus Signal Log.\n\n*The system remembers everyone who passes through.*`,
            };

            let msg = "";

            if (doorMessages[type]) {
              msg = doorMessages[type];
            } else if (type === "riddle") {
              msg = `📻 **Transmission received, @${user}.**\n\nYour answer has been logged in the Decoder Log.\nI'll review it and update the verdict (✅ or ❌) manually.\n\n*If you're correct — the vault opens.*`;
            } else if (type === "vault") {
              msg = `🔐 **You found the easter egg, @${user}.**\n\nNot many people read source code.\nThe vault counter has been updated.\n\nDM me on LinkedIn — there's something in here for you.`;
            } else {
              msg = `⚡ Signal received from @${user}. Processing complete.`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body: msg
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              state: "closed",
              labels: ["nexus-signal"]
            });
