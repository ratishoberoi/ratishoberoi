name: Raid Attack

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

concurrency:
  group: github-boss-raid
  cancel-in-progress: false

jobs:
  raid-attack:
    if: contains(github.event.issue.body, '### Attack Type') || contains(github.event.issue.labels.*.name, 'raid-attack')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Rebase latest state
        run: git pull --rebase origin "${{ github.event.repository.default_branch }}"

      - name: Process attack
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ATTACKER: ${{ github.event.issue.user.login }}
        run: node scripts/handle_attack.js

      - name: Commit raid state
        run: |
          if [ -z "$(git status --porcelain README.md assets/boss-card.svg assets/bosses assets/defeats data/boss.json data/boss_registry.json data/executioners.json data/leaderboard.json data/attacks.json data/hall_of_fame.json data/loot_registry.json data/player_inventory.json data/legendary_drops.json)" ]; then
            echo "No raid state changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md assets/boss-card.svg assets/bosses assets/defeats data/boss.json data/boss_registry.json data/executioners.json data/leaderboard.json data/attacks.json data/hall_of_fame.json data/loot_registry.json data/player_inventory.json data/legendary_drops.json
          git commit -m "Process raid attack"
          git pull --rebase origin "${{ github.event.repository.default_branch }}"
          git push origin HEAD:${{ github.event.repository.default_branch }}

      - name: Comment attack result
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: node scripts/comment_issue.js
